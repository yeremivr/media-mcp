<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B0E14">
<title>Cauce</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#0B0E14;
    --surface:#141922;
    --surface-2:#1C2330;
    --line:#252D3B;
    --text:#EAF0FA;
    --muted:#8B97AC;
    --flow:#3DD6C4;
    --flow-deep:#1FA697;
    --gold:#E8C37E;
    --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    overflow-x:hidden;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .ambient::before,.ambient::after{
    content:"";position:absolute;width:140%;height:60%;left:-20%;
    background:radial-gradient(ellipse at center,rgba(61,214,196,.10),transparent 70%);
    filter:blur(40px);animation:drift 18s ease-in-out infinite;
  }
  .ambient::before{top:-15%}
  .ambient::after{bottom:-20%;background:radial-gradient(ellipse at center,rgba(31,166,151,.08),transparent 70%);animation-delay:-9s}
  @keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(8%)}}

  .wrap{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:28px 20px 60px}

  header{display:flex;align-items:center;gap:12px;margin-bottom:28px;animation:fadeDown .7s cubic-bezier(.2,.8,.2,1)}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--flow),var(--flow-deep));
    display:grid;place-items:center;box-shadow:0 6px 20px rgba(61,214,196,.3)}
  .logo svg{width:20px;height:20px}
  .brand h1{font-size:19px;font-weight:700;letter-spacing:-.3px}
  .brand p{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}

  .status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);margin-left:auto}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--flow);box-shadow:0 0 10px var(--flow);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .empty{text-align:center;padding:70px 20px;animation:fadeIn .8s ease .2s both}
  .empty .ic{width:64px;height:64px;margin:0 auto 18px;border-radius:18px;background:var(--surface);
    display:grid;place-items:center;border:1px solid var(--line)}
  .empty .ic svg{width:30px;height:30px;opacity:.5}
  .empty h2{font-size:16px;font-weight:600;margin-bottom:8px}
  .empty p{font-size:13px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto}

  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;margin-bottom:16px;
    animation:cardIn .6s cubic-bezier(.2,.8,.2,1) both;
    transition:transform .3s ease,border-color .3s ease;
  }
  .card:active{transform:scale(.985)}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

  .thumb{position:relative;width:100%;aspect-ratio:16/9;background:var(--surface-2);overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s ease}
  .card:hover .thumb img{transform:scale(1.04)}
  .thumb .grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(11,14,20,.85),transparent 55%)}
  .badge{position:absolute;top:12px;left:12px;background:rgba(11,14,20,.7);backdrop-filter:blur(8px);
    padding:5px 11px;border-radius:99px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;
    border:1px solid rgba(255,255,255,.08)}
  .badge.video{color:var(--flow)}
  .badge.audio{color:var(--gold)}
  .badge svg{width:12px;height:12px}

  .body{padding:16px 18px 18px}
  .title{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:5px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .author{font-size:12.5px;color:var(--muted);margin-bottom:16px}

  .save{
    width:100%;border:none;border-radius:14px;padding:14px;cursor:pointer;
    font-size:14.5px;font-weight:700;letter-spacing:.2px;
    background:linear-gradient(135deg,var(--flow),var(--flow-deep));color:#04211E;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .2s ease,box-shadow .3s ease;
    box-shadow:0 4px 16px rgba(61,214,196,.25);
  }
  .save:active{transform:scale(.97)}
  .save svg{width:18px;height:18px}
  .save.done{background:var(--surface-2);color:var(--flow);box-shadow:none;border:1px solid var(--line)}
  .save .spin{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  .refresh{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:24px;z-index:5;
    width:52px;height:52px;border-radius:16px;border:none;cursor:pointer;
    background:var(--surface-2);border:1px solid var(--line);color:var(--flow);
    display:grid;place-items:center;box-shadow:0 8px 24px rgba(0,0,0,.4);
    transition:transform .3s ease}
  .refresh:active{transform:scale(.9) rotate(180deg)}
  .refresh svg{width:22px;height:22px}
  .refresh.loading svg{animation:spin 1s linear infinite}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="wrap">
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 7c4-3 8 3 12 0s4-3 4-3M4 13c4-3 8 3 12 0s4-3 4-3M4 19c4-3 8 3 12 0s4-3 4-3" stroke="#04211E" stroke-width="2" stroke-linecap="round"/></svg>
    </div>
    <div class="brand">
      <h1>Cauce</h1>
      <p>Tus descargas, en tu mano</p>
    </div>
    <div class="status"><span class="dot"></span><span id="statusText">En linea</span></div>
  </header>

  <div id="list"></div>
</div>

<button class="refresh" id="refreshBtn" aria-label="Actualizar">
  <svg viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 0 1 14-5.3L20 8M20 12a8 8 0 0 1-14 5.3L4 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 4v4h-4M4 20v-4h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</button>

<script>
const API = (localStorage.getItem('cauce_api') || location.origin).replace(/\/$/,'');

const list = document.getElementById('list');
const refreshBtn = document.getElementById('refreshBtn');
const statusText = document.getElementById('statusText');

const iconVideo = '<svg viewBox="0 0 24 24" fill="none"><path d="M15 10l4.5-2.6v9.2L15 14M4 6h9a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const iconAudio = '<svg viewBox="0 0 24 24" fill="none"><path d="M9 18V6l10-2v12M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM19 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function emptyState(msg){
  list.innerHTML = '<div class="empty">'+
    '<div class="ic"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="#8B97AC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
    '<h2>Aun no hay descargas</h2>'+
    '<p>'+(msg || 'Pidele a Claude que descargue un video o audio. Aparecera aqui, listo para guardar.')+'</p>'+
  '</div>';
}

function render(jobs){
  if(!jobs || !jobs.length){ emptyState(); return; }
  list.innerHTML = '';
  jobs.forEach(function(j,i){
    var isAudio = j.ext && ['mp3','m4a','opus','ogg','aac','wav'].indexOf(j.ext.toLowerCase())>=0;
    var card = document.createElement('div');
    card.className='card';
    card.style.animationDelay = (i*0.06)+'s';
    var thumb = j.thumbnail ? '<img src="'+j.thumbnail+'" alt="" onerror="this.style.display=\'none\'">' : '';
    card.innerHTML =
      '<div class="thumb">'+thumb+'<div class="grad"></div>'+
        '<div class="badge '+(isAudio?'audio':'video')+'">'+(isAudio?iconAudio+' Audio':iconVideo+' Video')+'</div>'+
      '</div>'+
      '<div class="body">'+
        '<div class="title">'+(j.title||'Sin titulo').replace(/</g,'&lt;')+'</div>'+
        '<div class="author">'+(j.uploader||'').replace(/</g,'&lt;')+'</div>'+
        '<button class="save" data-id="'+j.job_id+'" data-name="'+(j.title||'archivo')+'.'+(j.ext||'mp4')+'">'+
          '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
          'Guardar en mi telefono'+
        '</button>'+
      '</div>';
    list.appendChild(card);
  });
  bindSave();
}

function bindSave(){
  document.querySelectorAll('.save').forEach(function(btn){
    btn.addEventListener('click', async function(){
      if(btn.classList.contains('done')) return;
      var id = btn.dataset.id, name = btn.dataset.name, original = btn.innerHTML;
      btn.innerHTML = '<svg class="spin" viewBox="0 0 24 24" fill="none"><path d="M12 3a9 9 0 1 0 9 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Preparando...';
      try{
        var res = await fetch(API+'/api/file/'+id);
        if(!res.ok) throw new Error('no disponible');
        var blob = await res.blob();
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = name;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        btn.classList.add('done');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Guardado';
      }catch(e){
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 8v5m0 3h.01M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Reintentar';
        setTimeout(function(){btn.innerHTML=original;},2200);
      }
    });
  });
}

async function load(){
  refreshBtn.classList.add('loading');
  try{
    var res = await fetch(API+'/api/jobs');
    var data = await res.json();
    statusText.textContent = 'En linea';
    render(data.jobs);
  }catch(e){
    statusText.textContent = 'Sin conexion';
    emptyState('No pude conectar con el servidor. Puede estar despertando, espera unos segundos y toca actualizar.');
  }finally{
    refreshBtn.classList.remove('loading');
  }
}

refreshBtn.addEventListener('click', load);
load();
setInterval(load, 20000);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
